server:
  port: 8081

spring:
  profiles:
    active: @profile.active@
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: shenle123
      database: 0
    # 以后要切哨兵，改成下面这样，不需要动starter代码：
    # sentinel:
    #   master: mymaster
    #   nodes: 192.168.1.1:26379,192.168.1.2:26379
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/tria?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: root
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

custom:
  common:
    response-enabled: true       # 统一返回包装
    exception-enabled: true      # 通用异常兜底

  security:
    enabled: true                 # 登录鉴权总开关
    exception-enabled: true       # 安全异常处理
    exclude-paths:                # 免登录白名单
      - /api/client/auth/**
      - /api/client/dict/getAllDict
      - /uploads/**
      - /error
      - /swagger-ui/**
      - /v3/api-docs/**
    jwt:
      secret: MyProjectJwtSecretKey2026TriaAdminSystem
      expire-time: 7200000
      header-name: Authorization

  swagger:
    enabled: true
    title: 我的项目接口文档
    description: xxx项目API说明
    version: 1.0.0

  redis:
    enabled: true
    cache-enabled: true       # 要用@Cacheable才开
    cache-default-expire: 3600

  # custom-common-mybatisplus：分页/防全表更新/字段自动填充
  mybatis-plus:
    enabled: true
    page-enabled: true
    block-attack-enabled: true
    optimistic-lock-enabled: false    # 有版本号并发控制需求再开
    db-type: mysql


  file:
    storage-type: local          # local / oss，以后切云存储改这个值
    local-path: D:/workspace/tria-uploads/
    local-domain: http://localhost:8081/uploads